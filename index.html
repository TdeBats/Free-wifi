<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Bos wifi</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family: Arial, sans-serif;
    text-align:center;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

#loading{
    font-size:28px;
}

video{
    width:100%;
    height:100vh;
    object-fit:cover;
    display:none;
}
</style>

<body>

<div id="loading">
🔐Wachtwoord synchroniseren<br>
</div>

<video id="rickVideo" playsinline muted>
    <source src="rick.mp4" type="video/mp4">
</video>

<script>
setTimeout(()=>{
    document.getElementById("loading").style.display="none";

    const video = document.getElementById("rickVideo");
    video.style.display = "block";

    video.play().catch(()=>{});

}, 3000);
</script>
